name: package

on:
  workflow_dispatch:

jobs:
  package:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            output: stronghold-linux-x86_64
          - name: macos-arm64
            os: macos-latest
            output: stronghold-macos-arm64
          - name: windows-x86_64
            os: windows-latest
            output: stronghold-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Install dependencies
        run: cpanm -nq --installdeps --with-develop .

      - name: Build executable
        run: pp -I lib -o packed/${{ matrix.output }} script/stronghold.pl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: packed/${{ matrix.output }}
