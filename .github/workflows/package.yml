name: package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  package:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            output: stronghold-linux-x86_64
          - name: macos-arm64
            os: macos-latest
            output: stronghold-macos-arm64
          - name: windows-x86_64
            os: windows-latest
            output: stronghold-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Install dependencies
        run: cpanm -nq --installdeps --with-develop .

      - name: Build executable
        run: |
          mkdir -p packed
          pp -I lib -o packed/${{ matrix.output }} script/stronghold.pl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: packed/${{ matrix.output }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          find dist -type f -exec chmod +x {} \;
          gh release create "$RELEASE_TAG" dist/*/* \
            --title "Stronghold $RELEASE_TAG" \
            --notes "Standalone builds for Linux, macOS, and Windows." \
            || gh release upload "$RELEASE_TAG" dist/*/* --clobber
